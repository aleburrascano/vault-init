name: Main

# Single workflow for CI + Release. The `test` job runs on every push to
# main, every PR, and every tag push. The `publish` job runs only on tag
# pushes AND only after both matrix legs of `test` are green — so a
# Windows-only red blocks publish, and we don't run the test suite twice
# per tag push (the previous CI + Release split did, doubling the
# GitHub-API burst footprint and tripping abuse heuristics — see
# docs/roadmap.md "Live-test CI").

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

# Live tests create real `vk-live-*` repos. Two test PATs (A and B) are
# rotated round-robin via `GITHUB_RUN_NUMBER % 2` so per-account abuse
# heuristics see roughly half the load each. Concurrency: only one Main
# run touches either account at a time, so name collisions and orphan
# races stay contained regardless of which PAT was selected.
concurrency:
  group: vaultkit-live-tests
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      # Serial — both runners hit the same test GH account, and parallel
      # create/delete bursts trip GitHub's abuse heuristics. `max-parallel: 1`
      # roughly doubles wall-clock but keeps the account in good standing.
      max-parallel: 1
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Select test PAT (round-robin A/B)
        shell: bash
        env:
          # Classic PATs (delete_repo + repo + workflow scopes) on TWO
          # dedicated test GitHub accounts. Add both via repo Settings →
          # Secrets → Actions. Round-robin spreads abuse-heuristic load.
          PAT_A: ${{ secrets.VAULTKIT_TEST_GH_TOKEN_A }}
          PAT_B: ${{ secrets.VAULTKIT_TEST_GH_TOKEN_B }}
        run: |
          # GITHUB_RUN_NUMBER is auto-set by the runner. Re-runs of the
          # same run reuse the same number (so they pick the same PAT,
          # which is the desired retry semantics — operator must push a
          # new commit to flip to the other account).
          INDEX=$(( GITHUB_RUN_NUMBER % 2 ))
          if [ "$INDEX" -eq 0 ]; then
            LABEL=A
            CHOSEN="$PAT_A"
          else
            LABEL=B
            CHOSEN="$PAT_B"
          fi
          # Fail-closed if the chosen secret is missing — silent fallback
          # to the other PAT would mask config drift (someone forgetting
          # to add the second secret would see green CI on alternate runs).
          if [ -z "$CHOSEN" ]; then
            echo "VAULTKIT_TEST_GH_TOKEN_${LABEL} secret is missing — add both _A and _B." >&2
            exit 1
          fi
          echo "GH_TOKEN=$CHOSEN" >> "$GITHUB_ENV"
          echo "VAULTKIT_TEST_PAT_LABEL=$LABEL" >> "$GITHUB_ENV"
          echo "Selected PAT: $LABEL (run_number=$GITHUB_RUN_NUMBER)"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Authenticate gh CLI
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GH_TOKEN not exported by Select test PAT step." >&2
            exit 1
          fi
          # GH_TOKEN env is auto-detected by gh; no `gh auth login` needed.
          gh auth status

      - name: Configure git for live tests
        shell: bash
        run: |
          # init's preflight needs git user.name/user.email set, otherwise
          # it tries to prompt via @inquirer/prompts.input — which isn't
          # mocked in every live test file. Pre-setting them here makes the
          # prompt branch never fire.
          git config --global user.name "vaultkit-ci"
          git config --global user.email "ci@vaultkit.test"
          # `git push https://github.com/...` uses git's credential helper
          # (not gh's GH_TOKEN env). Wire a credential.helper that points
          # at the PAT so push works without interactive prompting.
          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "$GH_TOKEN" > "$HOME/.git-credentials"
          chmod 600 "$HOME/.git-credentials"

      - name: Pre-test cleanup of orphaned live-test repos
        if: always()
        shell: bash
        env:
          # Sweep both accounts — the previous run used the *other* PAT,
          # so its orphans live on a different account than this run's.
          PAT_A: ${{ secrets.VAULTKIT_TEST_GH_TOKEN_A }}
          PAT_B: ${{ secrets.VAULTKIT_TEST_GH_TOKEN_B }}
        run: |
          sweep_orphans() {
            local label="$1"
            local token="$2"
            if [ -z "$token" ]; then
              echo "Skipping cleanup for PAT $label — secret not set."
              return 0
            fi
            (
              # Sub-shell so the temp GH_TOKEN override doesn't leak to the
              # surrounding step (which still needs the run's chosen PAT).
              export GH_TOKEN="$token"
              local user
              user=$(gh api user --jq .login)
              # Filter inside jq so an empty result is an empty stream
              # (exit 0), not `grep`'s no-match exit 1 — bash -e -o pipefail
              # treats the latter as fatal and kills the workflow.
              gh repo list "$user" --limit 200 --json name \
                --jq '.[] | select(.name | startswith("vk-live-")) | .name' \
                | while read -r repo; do
                    echo "[$label] Deleting orphan: $user/$repo"
                    gh repo delete "$user/$repo" --yes || true
                  done
            )
          }
          sweep_orphans A "$PAT_A"
          sweep_orphans B "$PAT_B"

      - name: Run tests
        run: npm test

      - name: Post-test cleanup of any remaining live-test repos
        if: always()
        shell: bash
        env:
          PAT_A: ${{ secrets.VAULTKIT_TEST_GH_TOKEN_A }}
          PAT_B: ${{ secrets.VAULTKIT_TEST_GH_TOKEN_B }}
        run: |
          sweep_orphans() {
            local label="$1"
            local token="$2"
            if [ -z "$token" ]; then
              echo "Skipping cleanup for PAT $label — secret not set."
              return 0
            fi
            (
              export GH_TOKEN="$token"
              local user
              user=$(gh api user --jq .login)
              gh repo list "$user" --limit 200 --json name \
                --jq '.[] | select(.name | startswith("vk-live-")) | .name' \
                | while read -r repo; do
                    echo "[$label] Cleaning up: $user/$repo"
                    gh repo delete "$user/$repo" --yes || true
                  done
            )
          }
          sweep_orphans A "$PAT_A"
          sweep_orphans B "$PAT_B"

      - name: npm publish dry-run (verify package contents)
        run: npm publish --dry-run --access public

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG_VER="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VER" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
